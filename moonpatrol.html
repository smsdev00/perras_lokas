
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Moon Patrol - PerrasLocas Arcade</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: monospace;
      text-align: center;
    }
    iframe {
      border: 4px solid yellow;
      width: 100%;
      max-width: 640px;
      height: 480px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Moon Patrol - Simulador de Patrullaje Canino</h1>
  <p>Presioná "Jugar" para comenzar la misión intergaláctica.</p>
  <button onclick="cargarEmulador()">🎮 Jugar Moon Patrol</button>
  <div id="contenedor-juego"></div>

  <script>
    function cargarEmulador() {
      const contenedor = document.getElementById("contenedor-juego");
      contenedor.innerHTML = `
        <iframe
          src="https://archive.org/embed/arcade_mpatrol"
          webkitallowfullscreen
          mozallowfullscreen
          allowfullscreen>
        </iframe>`;
    }
  </script>
</body>
</html>
